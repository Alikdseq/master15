<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Мастер Принт · Отчёты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      body {
        background: #f0f4f8;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .tab-active {
        border-bottom: 2px solid #2563eb;
        color: #2563eb;
      }
      .card-stats {
        transition: all 0.2s;
      }
      .card-stats:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
      }
      @media (max-width: 768px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .report-table th,
        .report-table td {
          padding: 8px 6px;
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body class="p-5 md:p-8">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
          <i class="fas fa-chart-line text-blue-600 mr-3"></i>Отчёты
        </h1>
        <div class="flex gap-3">
          <button
            id="exportBtn"
            class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-5 rounded-full transition flex items-center gap-2"
          >
            <i class="fas fa-file-excel"></i> Экспорт
          </button>
          <button
            id="printBtn"
            class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-5 rounded-full transition flex items-center gap-2"
          >
            <i class="fas fa-print"></i> Печать
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-6 overflow-x-auto"
      >
        <div class="flex border-b min-w-max">
          <button
            class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="orders"
          >
            Отчёт по заказам
          </button>
          <button
            class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="finance"
          >
            Финансовый отчёт
          </button>
          <button
            class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="stock"
          >
            Складские отчёты
          </button>
          <button
            class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="clients"
          >
            Клиентская аналитика
          </button>
          <button
            class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="services"
          >
            Услуги / неисправности
          </button>
          <button
            class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="masters"
          >
            Загрузка мастеров
          </button>
        </div>
      </div>

      <!-- Filters panel (common) -->
      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mb-6"
      >
        <div class="flex flex-wrap gap-4 items-end">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1"
              >Период</label
            >
            <div class="flex gap-2">
              <input
                type="date"
                id="dateFrom"
                class="border border-gray-300 rounded-xl py-2 px-3 text-sm"
                value="2026-03-01"
              />
              <span class="self-center">—</span>
              <input
                type="date"
                id="dateTo"
                class="border border-gray-300 rounded-xl py-2 px-3 text-sm"
                value="2026-03-31"
              />
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1"
              >Быстрый выбор</label
            >
            <select
              id="quickPeriod"
              class="border border-gray-300 rounded-xl py-2 px-3 text-sm bg-white"
            >
              <option value="custom">Произвольный</option>
              <option value="today">Сегодня</option>
              <option value="week">Эта неделя</option>
              <option value="month">Этот месяц</option>
              <option value="quarter">Этот квартал</option>
            </select>
          </div>
          <div id="dynamicFilters" class="flex gap-3 flex-1">
            <!-- dynamic filters per tab -->
          </div>
          <div>
            <button
              id="applyBtn"
              class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-2 px-6 text-sm font-medium transition"
            >
              <i class="fas fa-chart-simple mr-1"></i> Сформировать
            </button>
            <button
              id="resetFiltersBtn"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl py-2 px-5 text-sm ml-2 transition"
            >
              <i class="fas fa-undo-alt mr-1"></i> Сбросить
            </button>
          </div>
        </div>
      </div>

      <!-- Tab content containers -->
      <div id="ordersTab" class="tab-content">
        <!-- filled dynamically -->
      </div>
      <div id="financeTab" class="tab-content hidden"></div>
      <div id="stockTab" class="tab-content hidden"></div>
      <div id="clientsTab" class="tab-content hidden"></div>
      <div id="servicesTab" class="tab-content hidden"></div>
      <div id="mastersTab" class="tab-content hidden"></div>
    </div>

      function renderOrdersTab() {
        const container = document.getElementById("ordersTab");
        const summary = mockOrders.summary;

      function renderClientsTab() {

        const html = `
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                <div class="bg-white rounded-2xl p-4 shadow-sm"><div class="text-gray-500">Всего клиентов</div><div class="text-2xl font-bold">${cl.total}</div></div>
                <div class="bg-white rounded-2xl p-4 shadow-sm"><div class="text-gray-500">Новые (за месяц)</div><div class="text-2xl font-bold text-green-600">${cl.new}</div></div>
                <div class="bg-white rounded-2xl p-4 shadow-sm"><div class="text-gray-500">Активные</div><div class="text-2xl font-bold">${cl.active}</div></div>
                <div class="bg-white rounded-2xl p-4 shadow-sm"><div class="text-gray-500">Вернувшиеся</div><div class="text-2xl font-bold">${cl.returned}</div></div>
                <div class="bg-white rounded-2xl p-4 shadow-sm"><div class="text-gray-500">Повторяемость</div><div class="text-2xl font-bold">${Math.round(cl.repeatRate * 100)}%</div></div>
            </div>
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div class="bg-white rounded-2xl p-4 shadow-sm border"><canvas id="tagsChart" height="200"></canvas><div class="text-center text-sm">Сегментация по тегам</div></div>
                <div class="bg-white rounded-2xl p-4 shadow-sm border"><h3 class="font-bold mb-2">Топ-5 клиентов по сумме</h3><div class="space-y-2">${cl.topBySum.map((c) => `<div class="flex justify-between border-b pb-1"><span>${c.name}</span><span>${c.total} ₽ (${c.orders} заказов)</span></div>`).join("")}</div></div>
            </div>
        `;
        container.innerHTML = html;
        const ctxTags = document.getElementById("tagsChart")?.getContext("2d");
        if (ctxTags)
          new Chart(ctxTags, {
            type: "pie",
            data: {
              labels: cl.distribution.map((t) => t.tag),
              datasets: [
                {
                  data: cl.distribution.map((t) => t.count),
                  backgroundColor: ["#f59e0b", "#3b82f6", "#10b981", "#8b5cf6"],
                },
              ],
            },
            options: { responsive: true },
          });
      }

      function renderServicesTab() {
        const container = document.getElementById("servicesTab");
        const html = `
            <div class="bg-white rounded-2xl shadow-sm border p-4 mb-6"><canvas id="servicesBarChart" height="250"></canvas></div>
            <div class="bg-white rounded-2xl shadow-sm border p-4"><h3 class="font-bold mb-3">Детализация услуг</h3><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Услуга / неисправность</th><th>Количество заказов</th><th>Доля</th></tr></thead><tbody>${mockServices.map((s) => `<tr class="border-b"><td class="p-2">${s.name}</td><td class="p-2">${s.count}</td><td class="p-2">${s.share}%</td></tr>`).join("")}</tbody></table></div></div>
        `;
        container.innerHTML = html;
        const ctxBar = document
          .getElementById("servicesBarChart")
          ?.getContext("2d");
        if (ctxBar)
          new Chart(ctxBar, {
            type: "bar",
            data: {
              labels: mockServices.map((s) => s.name.slice(0, 20)),
              datasets: [
                {
                  label: "Количество заказов",
                  data: mockServices.map((s) => s.count),
                  backgroundColor: "#3b82f6",
                },
              ],
            },
            options: { responsive: true },
          });
      }

      function renderMastersTab() {
        const container = document.getElementById("mastersTab");
        const html = `
            <div class="bg-white rounded-2xl shadow-sm border p-4"><h3 class="font-bold mb-3">Загрузка мастеров (текущая)</h3><div class="overflow-x-auto"><table class="w-full"><thead><tr><th>Мастер</th><th>Активных заказов</th><th>Завершено (мес)</th><th>Ср. время (дн)</th><th>Загрузка %</th></tr></thead><tbody>${mockMasters.map((m) => `<tr class="border-b"><td class="p-2">${m.name}</td><td class="p-2">${m.active}</td><td class="p-2">${m.completed}</td><td class="p-2">${m.avgDays}</td><td class="p-2"><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 rounded-full h-2" style="width: ${m.loadPercent}%"></div></div>${m.loadPercent}%</td></tr>`).join("")}</tbody></table></div></div>
            <div class="mt-6 bg-white rounded-2xl shadow-sm border p-4"><canvas id="masterLoadChart" height="200"></canvas><div class="text-center text-sm">Загрузка по дням (Петров А.)</div></div>
        `;
        container.innerHTML = html;
        const ctxLoad = document
          .getElementById("masterLoadChart")
          ?.getContext("2d");
        if (ctxLoad)
          new Chart(ctxLoad, {
            type: "line",
            data: {
              labels: ["1", "2", "3", "4", "5", "6", "7"],
              datasets: [
                {
                  label: "Заказов в работе",
                  data: [4, 5, 4, 6, 7, 5, 4],
                  borderColor: "#f97316",
                },
              ],
            },
            options: { responsive: true },
          });
      }

      function switchTab(tabId) {
        activeTab = tabId;
        document
          .querySelectorAll(".tab-content")
          .forEach((el) => el.classList.add("hidden"));
        document.getElementById(`${tabId}Tab`).classList.remove("hidden");
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("tab-active"));
        document
          .querySelector(`.tab-btn[data-tab="${tabId}"]`)
          .classList.add("tab-active");

        // render content on first open
        if (tabId === "orders") renderOrdersTab();
        else if (tabId === "finance") renderFinanceTab();
        else if (tabId === "stock") renderStockTab();
        else if (tabId === "clients") renderClientsTab();
        else if (tabId === "services") renderServicesTab();
        else if (tabId === "masters") renderMastersTab();
      }

      // Event listeners for filters (mock)
      document.getElementById("applyBtn").addEventListener("click", () => {
        alert("Демо-режим: отчёт сформирован с выбранными фильтрами");
        switchTab(activeTab);
      });
      document
        .getElementById("resetFiltersBtn")
        .addEventListener("click", () => {
          document.getElementById("dateFrom").value = "2026-03-01";
          document.getElementById("dateTo").value = "2026-03-31";
          document.getElementById("quickPeriod").value = "custom";
          alert("Фильтры сброшены");
          switchTab(activeTab);
        });
      document
        .getElementById("exportBtn")
        .addEventListener("click", () => alert("Экспорт XLSX (демо)"));
      document
        .getElementById("printBtn")
        .addEventListener("click", () => window.print());

      // quick period selection
      document.getElementById("quickPeriod").addEventListener("change", (e) => {
        const val = e.target.value;
        const today = new Date();
        if (val === "today") {
          const d = today.toISOString().slice(0, 10);
          document.getElementById("dateFrom").value = d;
          document.getElementById("dateTo").value = d;
        } else if (val === "week") {
          const start = new Date(today);
          start.setDate(today.getDate() - today.getDay() + 1);
          document.getElementById("dateFrom").value = start
            .toISOString()
            .slice(0, 10);
          const end = new Date(start);
          end.setDate(start.getDate() + 6);
          document.getElementById("dateTo").value = end
            .toISOString()
            .slice(0, 10);
        } else if (val === "month") {
          const start = new Date(today.getFullYear(), today.getMonth(), 1);
          document.getElementById("dateFrom").value = start
            .toISOString()
            .slice(0, 10);
          const end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
          document.getElementById("dateTo").value = end
            .toISOString()
            .slice(0, 10);
        } else if (val === "quarter") {
          const quarterStart = new Date(
            today.getFullYear(),
            Math.floor(today.getMonth() / 3) * 3,
            1,
          );
          document.getElementById("dateFrom").value = quarterStart
            .toISOString()
            .slice(0, 10);
          const quarterEnd = new Date(
            today.getFullYear(),
            Math.floor(today.getMonth() / 3) * 3 + 3,
            0,
          );
          document.getElementById("dateTo").value = quarterEnd
            .toISOString()
            .slice(0, 10);
        }
      });

      // tab click handlers
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });

      // initial load
      switchTab("orders");
    </script>
  </body>
</html>
