<!doctype html>

    <meta charset="UTF-8" />

      name="viewport"

      rel="stylesheet"

      body {
        background: #f0f4f8;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .tab-active {
        border-bottom: 2px solid #2563eb;
        color: #2563eb;
      }
      .card-settings {
        transition: all 0.2s;
      }
      .status-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .status-active {
        background: #d1fae5;
        color: #065f46;
      }
      .status-inactive {
        background: #fee2e2;
        color: #991b1b;
      }
      @media (max-width: 768px) {
        .admin-table th,
        .admin-table td {
          padding: 8px 6px;
          font-size: 0.75rem;
        }
        .tab-btn {
          padding: 0.75rem 0.75rem;
          font-size: 0.8rem;
        }
      }
    </style>
  </head>

      <!-- Header -->
      <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
          <i class="fas fa-cog text-blue-600 mr-3"></i>Администрирование
        </h1>
        <div
          class="text-sm bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200"
        >
          <i class="fas fa-shield-alt text-green-600 mr-1"></i> Только для
          администратора
        </div>
      </div>

      <!-- Tabs -->
      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-6 overflow-x-auto"
      >
        <div class="flex border-b min-w-max">
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="users"
          >
            👥 Пользователи
          </button>
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="settings"
          >
            ⚙️ Настройки системы
          </button>
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="templates"
          >
            📝 Шаблоны уведомлений
          </button>
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="statuses"
          >
            🔄 Статусы заказов
          </button>
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="stock"
          >
            📦 Пороги и склад
          </button>
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="backup"
          >
            💾 Резервное копирование
          </button>
          <button
            class="tab-btn px-5 py-3 font-medium text-gray-600 hover:text-blue-600 transition"
            data-tab="logs"
          >
            📋 Логирование
          </button>
        </div>
      </div>

      <!-- Tab Contents -->
      <div id="usersTab" class="tab-content">
        <!-- dynamic -->
      </div>
      <div id="settingsTab" class="tab-content hidden"></div>
      <div id="templatesTab" class="tab-content hidden"></div>
      <div id="statusesTab" class="tab-content hidden"></div>
      <div id="stockTab" class="tab-content hidden"></div>
      <div id="backupTab" class="tab-content hidden"></div>
      <div id="logsTab" class="tab-content hidden"></div>

                    </table>
                </div>
            </div>
        `;
        container.innerHTML = html;
        renderUsersTable();

          .getElementById("addUserBtn")
          .addEventListener("click", () =>
            alert("Демо: открыть форму добавления пользователя"),
          );
        document
          .getElementById("roleFilter")
          .addEventListener("change", () => renderUsersTable());
        document
          .getElementById("userSearch")
          .addEventListener("input", () => renderUsersTable());
      }

      function renderUsersTable() {
        const roleFilter =
          document.getElementById("roleFilter")?.value || "all";
        const search =
          document.getElementById("userSearch")?.value.toLowerCase() || "";
        let filtered = users.filter(
          (u) =>
            (roleFilter === "all" || u.role === roleFilter) &&
            (u.name.toLowerCase().includes(search) ||
              u.email.toLowerCase().includes(search)),
        );
        const tbody = document.getElementById("usersTableBody");
        tbody.innerHTML = filtered
          .map(
            (u) => `
            <tr class="border-b">
                <td class="p-3">${u.name}</td>
                <td class="p-3">${u.email}</td>
                <td class="p-3">${roleLabels[u.role]}</td>
                <td class="p-3">${u.phone || "—"}</td>
                <td class="p-3">${u.lastLogin}</td>
                <td class="p-3"><span class="status-badge ${u.active ? "status-active" : "status-inactive"}">${u.active ? "Активен" : "Заблокирован"}</span></td>
                <td class="p-3 text-center">
                    <button class="text-blue-600 hover:text-blue-800 mr-2 edit-user" data-id="${u.id}"><i class="fas fa-edit"></i></button>
                    <button class="text-gray-600 hover:text-gray-800 reset-pwd" data-id="${u.id}"><i class="fas fa-key"></i></button>
                    <button class="text-red-600 hover:text-red-800 toggle-active" data-id="${u.id}"><i class="fas ${u.active ? "fa-ban" : "fa-check-circle"}"></i></button>
                </td>
            </tr>
        `,
          )
          .join("");
        document
          .querySelectorAll(".edit-user")
          .forEach((btn) =>
            btn.addEventListener("click", () =>
              alert("Демо: редактирование пользователя"),
            ),
          );
        document
          .querySelectorAll(".reset-pwd")
          .forEach((btn) =>
            btn.addEventListener("click", () =>
              alert("Демо: сброс пароля отправлен на email"),
            ),
          );
        document.querySelectorAll(".toggle-active").forEach((btn) =>
          btn.addEventListener("click", (e) => {
            const id = parseInt(btn.dataset.id);
            const user = users.find((u) => u.id === id);
            if (user) {
              user.active = !user.active;
              renderUsersTable();
              alert(
                `Пользователь ${user.name} ${user.active ? "активирован" : "заблокирован"}`,
              );
            }
          }),
        );
      }

        document
          .getElementById("applyLogFilters")
          .addEventListener("click", () => alert("Фильтр логов (демо)"));
        document
          .getElementById("exportLogsBtn")
          .addEventListener("click", () => alert("Экспорт XLSX (демо)"));
      }

      function switchTab(tabId) {
        activeTab = tabId;
        document
          .querySelectorAll(".tab-content")
          .forEach((el) => el.classList.add("hidden"));
        document.getElementById(`${tabId}Tab`).classList.remove("hidden");
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("tab-active"));
        document
          .querySelector(`.tab-btn[data-tab="${tabId}"]`)
          .classList.add("tab-active");
        if (tabId === "users") renderUsersTab();
        else if (tabId === "settings") renderSettingsTab();
        else if (tabId === "templates") renderTemplatesTab();
        else if (tabId === "statuses") renderStatusesTab();
        else if (tabId === "stock") renderStockTab();
        else if (tabId === "backup") renderBackupTab();
        else if (tabId === "logs") renderLogsTab();
      }

      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });

      switchTab("users");
    </script>
  </body>
</html>
