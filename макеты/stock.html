<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мастер Принт · Учет расходников</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="max-w-5xl mx-auto p-6 bg-gray-50">
    <div class="flex items-center gap-3 mb-8">
      <i class="fas fa-cubes text-amber-600 text-3xl"></i>
      <h1 class="text-3xl font-bold">Учет расходников и запчастей</h1>
    </div>

    <div class="bg-white rounded-3xl p-6">
      <table class="w-full text-left">
        <thead class="border-b">
          <tr>
            <th class="py-3">Наименование</th>
            <th class="py-3">Остаток</th>
            <th class="py-3">Порог</th>
            <th class="py-3">Действие</th>
          </tr>
        </thead>
        <tbody id="stockTable">
          <!-- через JS -->
        </tbody>
      </table>
      <div
        class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200"
        id="warning"
      ></div>
    </div>

    <script>
      let stock = [
        { id: 1, name: "Картридж HP 1018", qty: 3, threshold: 5 },
        { id: 2, name: "Тонер Samsung 1610", qty: 8, threshold: 10 },
        { id: 3, name: "Ролик подачи бумаги", qty: 1, threshold: 2 },
      ];

      function renderStock() {
        const tbody = document.getElementById("stockTable");
        tbody.innerHTML = stock
          .map(
            (item) => `
                <tr class="border-b">
                    <td class="py-4">${item.name}</td>
                    <td class="py-4 font-bold ${item.qty <= item.threshold ? "text-red-600" : "text-green-600"}">${item.qty} шт</td>
                    <td class="py-4">${item.threshold} шт</td>
                    <td class="py-4">
                        <button onclick="useItem(${item.id})" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-xl text-sm">Списать 1</button>
                    </td>
                </tr>
            `,
          )
          .join("");

        const lowStock = stock.filter((item) => item.qty <= item.threshold);
        const warningDiv = document.getElementById("warning");
        if (lowStock.length > 0) {
          warningDiv.innerHTML = `<i class="fas fa-exclamation-triangle text-amber-600 mr-2"></i>Внимание: заканчиваются: ${lowStock.map((i) => i.name).join(", ")}. Пора заказать!`;
        } else {
          warningDiv.innerHTML = "✅ Всех расходников достаточно.";
        }
      }

      function useItem(id) {
        const item = stock.find((i) => i.id === id);
        if (item && item.qty > 0) {
          item.qty -= 1;
          renderStock();
        }
      }

      renderStock();
    </script>
  </body>
</html>
