<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Мастер Принт · Склад</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      body {
        background: #f0f4f8;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .status-badge {
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .low-stock {
        background-color: #fffbeb;
        border-left: 4px solid #f97316;
      }
      .modal-backdrop {
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
      }
      .clickable-row {
        cursor: pointer;
        transition: background 0.1s;
      }
      .clickable-row:hover {
        background-color: #f1f5f9;
      }
      @media (max-width: 768px) {
        .stock-table th,
        .stock-table td {
          padding: 8px 6px;
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body class="p-5 md:p-8">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
          <i class="fas fa-boxes text-blue-600 mr-3"></i>Склад
        </h1>
        <div class="flex gap-3">
          <button
            id="newProductBtn"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-full shadow-sm transition flex items-center gap-2"
          >
            <i class="fas fa-plus-circle"></i> Новый товар
          </button>
          <button
            id="receiptBtn"
            class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-5 rounded-full transition flex items-center gap-2"
          >
            <i class="fas fa-dolly"></i> Поступление
          </button>
          <button
            id="writeOffBtn"
            class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-5 rounded-full transition flex items-center gap-2"
          >
            <i class="fas fa-minus-circle"></i> Списание
          </button>
          <button
            id="exportBtn"
            class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-5 rounded-full transition flex items-center gap-2"
          >
            <i class="fas fa-file-excel"></i> Экспорт
          </button>
        </div>
      </div>

      <!-- Filters -->
      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mb-6"
      >
        <div class="flex flex-wrap gap-4 items-end">
          <div class="flex-1 min-w-[200px]">
            <label class="block text-xs font-semibold text-gray-500 mb-1"
              >Поиск</label
            >
            <input
              type="text"
              id="searchInput"
              placeholder="Артикул, наименование"
              class="w-full border border-gray-300 rounded-xl py-2 px-3 text-sm"
            />
          </div>
          <div class="min-w-[150px]">
            <label class="block text-xs font-semibold text-gray-500 mb-1"
              >Категория</label
            >
            <select
              id="categoryFilter"
              class="w-full border border-gray-300 rounded-xl py-2 px-3 text-sm bg-white"
            >
              <option value="all">Все категории</option>
              <option value="Картриджи">Картриджи</option>
              <option value="Тонер">Тонер</option>
              <option value="Бумага">Бумага</option>
              <option value="Запчасти">Запчасти</option>
            </select>
          </div>
          <div class="flex items-center gap-2">
            <input type="checkbox" id="lowStockOnly" class="w-4 h-4" />
            <label for="lowStockOnly" class="text-sm text-gray-700"
              >Только товары ниже порога</label
            >
          </div>
          <div>
            <button
              id="resetFiltersBtn"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl py-2 px-5 text-sm transition"
            >
              <i class="fas fa-undo-alt mr-1"></i> Сбросить
            </button>
          </div>
        </div>
      </div>

      <!-- Products table -->
      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-sm stock-table">
            <thead class="bg-gray-50 text-gray-600 border-b">
              <tr>
                <th class="py-3 px-4 text-left">Артикул</th>
                <th class="py-3 px-4 text-left">Наименование</th>
                <th class="py-3 px-4 text-left">Категория</th>
                <th class="py-3 px-4 text-left">Ед.изм.</th>
                <th class="py-3 px-4 text-left">Остаток</th>
                <th class="py-3 px-4 text-left">Мин.порог</th>
                <th class="py-3 px-4 text-left">Закуп.цена</th>
                <th class="py-3 px-4 text-center">Действия</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <!-- dynamic -->
            </tbody>
          </table>
        </div>
        <div
          class="bg-gray-50 px-4 py-3 border-t flex justify-between items-center text-sm text-gray-500"
        >
          <div>Всего товаров: <span id="totalProductsCount">0</span></div>
          <div id="paginationControls" class="flex gap-2"></div>
        </div>
      </div>
    </div>

    <!-- Modal: New Product -->
    <div
      id="newProductModal"
      class="fixed inset-0 z-50 hidden items-center justify-center"
    >
      <div
        class="modal-backdrop absolute inset-0 bg-black/50"
        onclick="closeModal('newProductModal')"
      ></div>
      <div
        class="relative bg-white rounded-2xl max-w-lg w-full mx-4 shadow-2xl"
      >
        <div
          class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold">Новый товар</h2>
          <button
            onclick="closeModal('newProductModal')"
            class="text-gray-400 hover:text-gray-600"
          >
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div class="p-6">
          <form id="newProductForm">
            <div class="mb-4">
              <label class="block font-medium mb-1">Артикул *</label
              ><input
                type="text"
                id="productSku"
                required
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Наименование *</label
              ><input
                type="text"
                id="productName"
                required
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Категория</label
              ><select
                id="productCategory"
                class="w-full border rounded-xl px-4 py-2"
              >
                <option>Картриджи</option>
                <option>Тонер</option>
                <option>Бумага</option>
                <option>Запчасти</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Единица измерения</label
              ><select
                id="productUnit"
                class="w-full border rounded-xl px-4 py-2"
              >
                <option>шт.</option>
                <option>кг</option>
                <option>уп.</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Минимальный остаток</label
              ><input
                type="number"
                id="productMinStock"
                value="5"
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Закупочная цена (₽)</label
              ><input
                type="number"
                id="productPurchasePrice"
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="flex justify-end gap-3 pt-4">
              <button
                type="button"
                onclick="closeModal('newProductModal')"
                class="px-5 py-2 border rounded-full"
              >
                Отмена
              </button>
              <button
                type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700"
              >
                Создать
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal: Receipt (поступление) -->
    <div
      id="receiptModal"
      class="fixed inset-0 z-50 hidden items-center justify-center"
    >
      <div
        class="modal-backdrop absolute inset-0 bg-black/50"
        onclick="closeModal('receiptModal')"
      ></div>
      <div
        class="relative bg-white rounded-2xl max-w-lg w-full mx-4 shadow-2xl"
      >
        <div
          class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold">Поступление товара</h2>
          <button
            onclick="closeModal('receiptModal')"
            class="text-gray-400 hover:text-gray-600"
          >
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div class="p-6">
          <form id="receiptForm">
            <div class="mb-4">
              <label class="block font-medium mb-1">Товар</label
              ><select
                id="receiptProductId"
                class="w-full border rounded-xl px-4 py-2"
              ></select>
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Количество</label
              ><input
                type="number"
                id="receiptQuantity"
                required
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1"
                >Комментарий (опционально)</label
              ><input
                type="text"
                id="receiptComment"
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="flex justify-end gap-3 pt-4">
              <button
                type="button"
                onclick="closeModal('receiptModal')"
                class="px-5 py-2 border rounded-full"
              >
                Отмена
              </button>
              <button
                type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700"
              >
                Оприходовать
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal: Write-off (списание) -->
    <div
      id="writeOffModal"
      class="fixed inset-0 z-50 hidden items-center justify-center"
    >
      <div
        class="modal-backdrop absolute inset-0 bg-black/50"
        onclick="closeModal('writeOffModal')"
      ></div>
      <div
        class="relative bg-white rounded-2xl max-w-lg w-full mx-4 shadow-2xl"
      >
        <div
          class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold">Списание товара</h2>
          <button
            onclick="closeModal('writeOffModal')"
            class="text-gray-400 hover:text-gray-600"
          >
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div class="p-6">
          <form id="writeOffForm">
            <div class="mb-4">
              <label class="block font-medium mb-1">Товар</label
              ><select
                id="writeOffProductId"
                class="w-full border rounded-xl px-4 py-2"
              ></select>
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Количество</label
              ><input
                type="number"
                id="writeOffQuantity"
                required
                class="w-full border rounded-xl px-4 py-2"
              />
            </div>
            <div class="mb-4">
              <label class="block font-medium mb-1">Причина</label
              ><select
                id="writeOffReason"
                class="w-full border rounded-xl px-4 py-2"
              >
                <option>Порча</option>
                <option>Утеря</option>
                <option>Инвентаризация</option>
                <option>Другое</option>
              </select>
            </div>
            <div class="flex justify-end gap-3 pt-4">
              <button
                type="button"
                onclick="closeModal('writeOffModal')"
                class="px-5 py-2 border rounded-full"
              >
                Отмена
              </button>
              <button
                type="submit"
                class="bg-red-600 text-white px-6 py-2 rounded-full hover:bg-red-700"
              >
                Списать
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal: Product Details (Card) -->
    <div
      id="productDetailModal"
      class="fixed inset-0 z-50 hidden items-center justify-center"
    >
      <div
        class="modal-backdrop absolute inset-0 bg-black/50"
        onclick="closeModal('productDetailModal')"
      ></div>
      <div
        class="relative bg-white rounded-2xl max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto shadow-2xl"
      >
        <div
          class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center"
        >
          <h2 class="text-xl font-bold" id="detailProductName"></h2>
          <button
            onclick="closeModal('productDetailModal')"
            class="text-gray-400 hover:text-gray-600"
          >
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div class="p-6" id="productDetailContent">
          <!-- dynamic content -->
        </div>
      </div>
    </div>

    <script>
      // Mock data
      let products = [
        {
          id: 1,
          sku: "HP85",
          name: "Картридж HP 85A",
          category: "Картриджи",
          unit: "шт.",
          current_stock: 2,
          min_stock: 5,
          purchase_price: 1200,
          selling_price: 1800,
        },
        {
          id: 2,
          sku: "TNR1",
          name: "Тонер Canon 125",
          category: "Тонер",
          unit: "шт.",
          current_stock: 12,
          min_stock: 3,
          purchase_price: 850,
          selling_price: 1200,
        },
        {
          id: 3,
          sku: "BUM1",
          name: "Бумага А4 (5 пачек)",
          category: "Бумага",
          unit: "уп.",
          current_stock: 1,
          min_stock: 2,
          purchase_price: 300,
          selling_price: 450,
        },
        {
          id: 4,
          sku: "ROL3",
          name: "Ролик захвата HP",
          category: "Запчасти",
          unit: "шт.",
          current_stock: 0,
          min_stock: 2,
          purchase_price: 500,
          selling_price: 900,
        },
        {
          id: 5,
          sku: "HP12",
          name: "Картридж HP 12A",
          category: "Картриджи",
          unit: "шт.",
          current_stock: 8,
          min_stock: 4,
          purchase_price: 1100,
          selling_price: 1650,
        },
        {
          id: 6,
          sku: "CAN12",
          name: "Тонер Canon 120",
          category: "Тонер",
          unit: "шт.",
          current_stock: 4,
          min_stock: 2,
          purchase_price: 700,
          selling_price: 1050,
        },
        {
          id: 7,
          sku: "A4BOX",
          name: "Бумага А4 (10 пачек)",
          category: "Бумага",
          unit: "уп.",
          current_stock: 3,
          min_stock: 1,
          purchase_price: 550,
          selling_price: 800,
        },
        {
          id: 8,
          sku: "FUJI",
          name: "Фотобарабан Fuji",
          category: "Запчасти",
          unit: "шт.",
          current_stock: 2,
          min_stock: 3,
          purchase_price: 2500,
          selling_price: 3800,
        },
      ];

      // Mock movement history (for details)
      const mockMovements = {
        1: [
          {
            date: "2026-03-15",
            type: "Поступление",
            quantity: 5,
            reason: "Поставка",
            user: "Админ",
          },
          {
            date: "2026-03-18",
            type: "Списание",
            quantity: 3,
            reason: "Заказ #2403-0012",
            user: "Мастер",
          },
        ],
        2: [
          {
            date: "2026-03-10",
            type: "Поступление",
            quantity: 10,
            reason: "Поставка",
            user: "Админ",
          },
        ],
        3: [
          {
            date: "2026-03-05",
            type: "Поступление",
            quantity: 5,
            reason: "Поставка",
            user: "Админ",
          },
          {
            date: "2026-03-12",
            type: "Списание",
            quantity: 4,
            reason: "Заказ #2403-0010",
            user: "Мастер",
          },
        ],
        4: [],
        5: [
          {
            date: "2026-03-01",
            type: "Поступление",
            quantity: 8,
            reason: "Начальный остаток",
            user: "Админ",
          },
        ],
        6: [
          {
            date: "2026-03-14",
            type: "Поступление",
            quantity: 4,
            reason: "Поставка",
            user: "Админ",
          },
        ],
        7: [
          {
            date: "2026-03-07",
            type: "Поступление",
            quantity: 3,
            reason: "Поставка",
            user: "Админ",
          },
        ],
        8: [
          {
            date: "2026-03-02",
            type: "Поступление",
            quantity: 2,
            reason: "Поставка",
            user: "Админ",
          },
        ],
      };

      // State
      let currentFilter = { search: "", category: "all", lowStockOnly: false };
      let currentPage = 1;
      const rowsPerPage = 6;

      function filterProducts() {
        let filtered = products.filter((p) => {
          if (
            currentFilter.search &&
            !p.sku.toLowerCase().includes(currentFilter.search.toLowerCase()) &&
            !p.name.toLowerCase().includes(currentFilter.search.toLowerCase())
          )
            return false;
          if (
            currentFilter.category !== "all" &&
            p.category !== currentFilter.category
          )
            return false;
          if (currentFilter.lowStockOnly && p.current_stock > p.min_stock)
            return false;
          return true;
        });
        return filtered;
      }

      function renderTable() {
        const filtered = filterProducts();
        const total = filtered.length;
        document.getElementById("totalProductsCount").innerText = total;
        const start = (currentPage - 1) * rowsPerPage;
        const paginated = filtered.slice(start, start + rowsPerPage);
        const tbody = document.getElementById("productsTableBody");
        tbody.innerHTML = paginated
          .map((p) => {
            const isLow = p.current_stock <= p.min_stock;
            return `
                <tr class="border-b clickable-row ${isLow ? "low-stock" : ""}" data-product-id="${p.id}">
                    <td class="py-3 px-4 font-mono text-xs">${p.sku}</td>
                    <td class="py-3 px-4 font-medium">${p.name}</td>
                    <td class="py-3 px-4">${p.category}</td>
                    <td class="py-3 px-4">${p.unit}</td>
                    <td class="py-3 px-4 ${isLow ? "text-orange-600 font-bold" : ""}">${p.current_stock}</td>
                    <td class="py-3 px-4">${p.min_stock}</td>
                    <td class="py-3 px-4">${p.purchase_price ? p.purchase_price + " ₽" : "—"}</td>
                    <td class="py-3 px-4 text-center">
                        <button class="edit-product text-blue-600 hover:text-blue-800 mx-1" data-id="${p.id}"><i class="fas fa-edit"></i></button>
                        <button class="receipt-product text-green-600 hover:text-green-800 mx-1" data-id="${p.id}"><i class="fas fa-dolly"></i></button>
                        <button class="writeoff-product text-red-600 hover:text-red-800 mx-1" data-id="${p.id}"><i class="fas fa-minus-circle"></i></button>
                        <button class="history-product text-gray-600 hover:text-gray-800 mx-1" data-id="${p.id}"><i class="fas fa-history"></i></button>
                    </td>
                </tr>
            `;
          })
          .join("");
        // Pagination
        const totalPages = Math.ceil(total / rowsPerPage);
        const paginationDiv = document.getElementById("paginationControls");
        if (totalPages > 1) {
          let btns = "";
          for (let i = 1; i <= totalPages; i++) {
            btns += `<button class="px-3 py-1 rounded-full ${i === currentPage ? "bg-blue-600 text-white" : "bg-gray-200 text-gray-700"} text-sm" data-page="${i}">${i}</button>`;
          }
          paginationDiv.innerHTML = btns;
          paginationDiv.querySelectorAll("button").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              currentPage = parseInt(btn.dataset.page);
              renderTable();
            });
          });
        } else {
          paginationDiv.innerHTML = "";
        }
      }

      function openProductDetail(productId) {
        const product = products.find((p) => p.id == productId);
        if (!product) return;
        document.getElementById("detailProductName").innerText =
          `${product.sku} — ${product.name}`;
        const movements = mockMovements[productId] || [];
        const ordersUsed =
          productId === 1
            ? ["2403-0012"]
            : productId === 3
              ? ["2403-0010"]
              : [];
        const historyHtml = movements.length
          ? `
            <table class="w-full text-sm border">
                <thead class="bg-gray-50"><tr><th class="p-2 text-left">Дата</th><th class="p-2 text-left">Тип</th><th class="p-2 text-left">Кол-во</th><th class="p-2 text-left">Причина</th><th class="p-2 text-left">Кто</th></tr></thead>
                <tbody>${movements.map((m) => `<tr><td class="p-2">${m.date}</td><td class="p-2">${m.type}</td><td class="p-2">${m.quantity}</td><td class="p-2">${m.reason}</td><td class="p-2">${m.user}</td></tr>`).join("")}</tbody>
            </table>
        `
          : '<p class="text-gray-500">Нет движений</p>';
        const ordersHtml = ordersUsed.length
          ? `<div class="mt-4"><h4 class="font-semibold">Использован в заказах:</h4><ul>${ordersUsed.map((o) => `<li><a href="#" class="text-blue-600">${o}</a></li>`).join("")}</ul></div>`
          : "";
        const content = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="font-bold text-lg mb-3">Основная информация</h3>
                    <div class="space-y-2">
                        <p><span class="text-gray-500">Артикул:</span> ${product.sku}</p>
                        <p><span class="text-gray-500">Категория:</span> ${product.category}</p>
                        <p><span class="text-gray-500">Единица измерения:</span> ${product.unit}</p>
                        <p><span class="text-gray-500">Текущий остаток:</span> <span class="${product.current_stock <= product.min_stock ? "text-orange-600 font-bold" : ""}">${product.current_stock}</span></p>
                        <p><span class="text-gray-500">Минимальный остаток:</span> ${product.min_stock}</p>
                        <p><span class="text-gray-500">Закупочная цена:</span> ${product.purchase_price ? product.purchase_price + " ₽" : "—"}</p>
                        <p><span class="text-gray-500">Цена продажи:</span> ${product.selling_price ? product.selling_price + " ₽" : "—"}</p>
                    </div>
                    <div class="mt-4"><button id="editProductFromDetail" class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm"><i class="fas fa-edit"></i> Редактировать</button></div>
                </div>
                <div>
                    <h3 class="font-bold text-lg mb-3">История движений</h3>
                    ${historyHtml}
                    ${ordersHtml}
                </div>
            </div>
        `;
        document.getElementById("productDetailContent").innerHTML = content;
        document
          .getElementById("editProductFromDetail")
          ?.addEventListener("click", () =>
            alert(`Демо: редактирование товара ${product.name}`),
          );
        document
          .getElementById("productDetailModal")
          .classList.remove("hidden");
        document.getElementById("productDetailModal").classList.add("flex");
      }

      function addProduct(product) {
        const newId = Math.max(...products.map((p) => p.id)) + 1;
        products.push({ id: newId, ...product, current_stock: 0 });
        renderTable();
      }

      function updateStock(productId, quantity, type, reason) {
        const product = products.find((p) => p.id == productId);
        if (!product) return;
        if (type === "in") {
          product.current_stock += quantity;
        } else if (type === "out") {
          if (product.current_stock < quantity) {
            alert(`Недостаточно остатка! Доступно: ${product.current_stock}`);
            return false;
          }
          product.current_stock -= quantity;
        }
        // Mock add movement (for demo)
        if (!mockMovements[productId]) mockMovements[productId] = [];
        mockMovements[productId].unshift({
          date: new Date().toISOString().slice(0, 10),
          type: type === "in" ? "Поступление" : "Списание",
          quantity: quantity,
          reason: reason,
          user: "Админ",
        });
        renderTable();
        return true;
      }

      // Populate select dropdowns for modals
      function populateProductSelect(selectId) {
        const select = document.getElementById(selectId);
        select.innerHTML = products
          .map(
            (p) =>
              `<option value="${p.id}">${p.sku} — ${p.name} (остаток: ${p.current_stock})</option>`,
          )
          .join("");
      }

      // Event listeners
      document.getElementById("searchInput").addEventListener("input", (e) => {
        currentFilter.search = e.target.value;
        currentPage = 1;
        renderTable();
      });
      document
        .getElementById("categoryFilter")
        .addEventListener("change", (e) => {
          currentFilter.category = e.target.value;
          currentPage = 1;
          renderTable();
        });
      document
        .getElementById("lowStockOnly")
        .addEventListener("change", (e) => {
          currentFilter.lowStockOnly = e.target.checked;
          currentPage = 1;
          renderTable();
        });
      document
        .getElementById("resetFiltersBtn")
        .addEventListener("click", () => {
          document.getElementById("searchInput").value = "";
          document.getElementById("categoryFilter").value = "all";
          document.getElementById("lowStockOnly").checked = false;
          currentFilter = { search: "", category: "all", lowStockOnly: false };
          currentPage = 1;
          renderTable();
        });
      document
        .getElementById("exportBtn")
        .addEventListener("click", () => alert("Экспорт XLSX (демо-версия)"));
      document
        .getElementById("newProductBtn")
        .addEventListener("click", () => openModal("newProductModal"));
      document.getElementById("receiptBtn").addEventListener("click", () => {
        populateProductSelect("receiptProductId");
        openModal("receiptModal");
      });
      document.getElementById("writeOffBtn").addEventListener("click", () => {
        populateProductSelect("writeOffProductId");
        openModal("writeOffModal");
      });

      document
        .getElementById("newProductForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const newProduct = {
            sku: document.getElementById("productSku").value.trim(),
            name: document.getElementById("productName").value.trim(),
            category: document.getElementById("productCategory").value,
            unit: document.getElementById("productUnit").value,
            min_stock: parseInt(
              document.getElementById("productMinStock").value,
            ),
            purchase_price:
              parseInt(document.getElementById("productPurchasePrice").value) ||
              null,
            selling_price: null,
          };
          if (!newProduct.sku || !newProduct.name)
            return alert("Заполните артикул и наименование");
          addProduct(newProduct);
          closeModal("newProductModal");
          document.getElementById("newProductForm").reset();
        });

      document.getElementById("receiptForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const productId = parseInt(
          document.getElementById("receiptProductId").value,
        );
        const quantity = parseInt(
          document.getElementById("receiptQuantity").value,
        );
        if (!quantity || quantity <= 0)
          return alert("Введите корректное количество");
        const comment = document.getElementById("receiptComment").value;
        updateStock(productId, quantity, "in", comment || "Поступление");
        closeModal("receiptModal");
        document.getElementById("receiptForm").reset();
      });

      document
        .getElementById("writeOffForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const productId = parseInt(
            document.getElementById("writeOffProductId").value,
          );
          const quantity = parseInt(
            document.getElementById("writeOffQuantity").value,
          );
          if (!quantity || quantity <= 0)
            return alert("Введите корректное количество");
          const reason = document.getElementById("writeOffReason").value;
          const success = updateStock(productId, quantity, "out", reason);
          if (success) {
            closeModal("writeOffModal");
            document.getElementById("writeOffForm").reset();
          }
        });

      function openModal(modalId) {
        document.getElementById(modalId).classList.remove("hidden");
        document.getElementById(modalId).classList.add("flex");
      }
      window.closeModal = function (modalId) {
        document.getElementById(modalId).classList.add("hidden");
        document.getElementById(modalId).classList.remove("flex");
      };

      // Delegation for row click and buttons
      document
        .getElementById("productsTableBody")
        .addEventListener("click", (e) => {
          const row = e.target.closest(".clickable-row");
          if (row && !e.target.closest("button")) {
            const productId = row.dataset.productId;
            openProductDetail(productId);
          }
          if (e.target.closest(".edit-product")) {
            const id = e.target.closest(".edit-product").dataset.id;
            alert(`Демо: редактирование товара ID ${id}`);
          }
          if (e.target.closest(".receipt-product")) {
            const id = e.target.closest(".receipt-product").dataset.id;
            populateProductSelect("receiptProductId");
            document.getElementById("receiptProductId").value = id;
            openModal("receiptModal");
          }
          if (e.target.closest(".writeoff-product")) {
            const id = e.target.closest(".writeoff-product").dataset.id;
            populateProductSelect("writeOffProductId");
            document.getElementById("writeOffProductId").value = id;
            openModal("writeOffModal");
          }
          if (e.target.closest(".history-product")) {
            const id = e.target.closest(".history-product").dataset.id;
            openProductDetail(id);
          }
        });

      renderTable();
    </script>
  </body>
</html>
