# Пример для ХОСТОВОГО nginx (не Docker), когда порты 80/443 уже заняты,
# а CRM крутится в Docker с пробросом nginx как 8888->80 (и при необходимости 8443->443).
#
# Куда положить: зависит от ОС (часто /etc/nginx/conf.d/crm.master15.ru.conf или
# фрагмент в sites-enabled). После правок: nginx -t && systemctl reload nginx
#
# DNS: crm.master15.ru → IP этого сервера (у вас уже так).

# Нужно для корректной передачи WebSocket на /ws/
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP ---
# Порядок работы:
# 1) Сначала включите только блок ниже с proxy_pass (и БЕЗ return 301), выпустите сертификат.
# 2) Потом добавьте server { listen 443 ssl ... } и включите return 301 на HTTPS в блоке :80.
server {
    listen 80;
    listen [::]:80;
    server_name crm.master15.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # После настройки HTTPS на хосте — раскомментируйте редирект и уберите дублирующий location / выше
    # (оставьте только acme-challenge + return):
    # return 301 https://$host$request_uri;
}

