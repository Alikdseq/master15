server {
    listen 80;
    listen [::]:80;
    server_name crm.master15.ru;

    # Для Let's Encrypt HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Пока SSL не выпущен — обслуживаем по HTTP.
    # После выпуска сертификата мы включим редирект на HTTPS и второй server {} на 443.

    client_max_body_size 25m;

    # Frontend (Vite build -> статические файлы)
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (Channels)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Django static/media
    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /srv/media/;
        access_log off;
        expires 30d;
    }

    # SPA routing: всё неизвестное отдаём в index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

