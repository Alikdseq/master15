services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: master_print
      POSTGRES_USER: master_print
      POSTGRES_PASSWORD: master_print
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
volumes:
  pgdata:
