services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-master_print}
      POSTGRES_USER: ${POSTGRES_USER:-master_print}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-db-password}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-change-me-change-me-change-me}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-master_print}"
      POSTGRES_USER: "${POSTGRES_USER:-master_print}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-strong-db-password}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SMS_PROVIDER: "dummy"
      SMS_DRY_RUN: "1"
    depends_on:
      - postgres
      - redis
      - backend
    command: ["sh", "-c", "celery -A config worker -l INFO"]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-change-me-change-me-change-me}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-master_print}"
      POSTGRES_USER: "${POSTGRES_USER:-master_print}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-strong-db-password}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SMS_PROVIDER: "dummy"
      SMS_DRY_RUN: "1"
    depends_on:
      - postgres
      - redis
      - backend
    command: ["sh", "-c", "celery -A config beat -l INFO"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-change-me-change-me-change-me}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-master_print}"
      POSTGRES_USER: "${POSTGRES_USER:-master_print}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-strong-db-password}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SMS_PROVIDER: "dummy"
      SMS_DRY_RUN: "1"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # Browser runs on host, so use host-mapped backend port.
      VITE_API_BASE_URL: "http://localhost:8000/api"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:

